name: inf_nlos_dl
description: >-
  3GPP TR 38.901 v17 §7.4.1 Indoor Factory NLOS, Dense Clutter, Low BS
  (InF-DL) at 5.18 GHz. PL_NLOS(d, fc) = 18.6 + 35.7·log10(d3D) + 20·log10(fc[GHz]).
  At fc = 5.18 GHz this reduces to PL = 32.87 + 35.7·log10(d). Shadowing
  sigma = 7.2 dB. Validity: 1 m ≤ d ≤ 600 m. Citation: [3GPP38901] in
  BIBLIOGRAPHY.md / paper.bib.
carrier_frequency_hz: 5.18e9
bandwidth_hz: 20e6
max_distance_m: 50
distance_m: [3, 6, 9, 12, 20, 30, 50]
tx_power_dbm: 18
noise_figure_db: 7
path_loss_exponent: 3.57          # = 35.7 / 10  (3GPP InF-DL NLOS slope)
reference_loss_db: 32.87          # = 18.6 + 20*log10(5.18 GHz)
reference_distance_m: 1.0
shadowing_std_db: 7.2             # 3GPP InF-DL NLOS log-normal SF std
rayleigh_fading: false            # InF SSF is best modelled via trace replay;
                                  # the default here is path-loss + log-normal SF
                                  # only. Set true for a coarser proxy with
                                  # added Rayleigh draws.
coherence_time_ms: 5
industrial_excess_loss_db: 0.0    # 3GPP InF embeds clutter loss in the slope
                                  # already; keep this at 0 to avoid double
                                  # counting.
receiver_sensitivity_dbm: -95
packet_detection_threshold_dbm: -90
snr_to_per: ns3_error_model
