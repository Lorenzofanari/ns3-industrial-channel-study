# Statistically balanced full campaign for the OFDMA retargeting study.
#
# This is the executable full matrix used before paper drafting. It covers the
# mandatory user/MCS/payload factors and the main OFDMA/jammer/policy axes
# without expanding the very large burst/interval/cooldown/phase Cartesian
# product of configs/ofdma_ru_diversity_main.yaml.
simulation:
  simulation_path: ns3_core_harness
  simulation_time_s: 1.0
  warmup_s: 0.5
  seeds: [20260507, 20260508, 20260509]
  output_dir: results/ofdma_full_balanced_campaign
  packets_per_run: 5000
  deadline_ms: 10.0

sweep:
  channel_model: [cm8_rayleigh]
  scenario: [S4]
  policy: [baseline_pf, rtx_assist, cooldown_only, ru_retarget_only, cooldown_plus_retarget, random_ru_hop, oracle_best_ru]
  mcs: [0, 1, 3]
  payload_bits: [128, 256, 512]
  cm8_distance_m: [3, 6]
  jammer_mode: [none]
  jammer_ru_mode: [broadband_reactive, narrowband_reactive, partial_band_reactive_random]
  jammer_power_dbm: [10, 20]
  num_users: [6, 20]
  num_rus: [4, 8]
  ru_width_tones: [26]
  ru_correlation_rho: [0.2]
  jammed_ru_count: [1, 2]
  jammer_burst_ms: [4]
  jammer_interval_ms: [20]
  jammer_phase_ms: [0]
  cooldown_symbols: [76]

ofdma:
  per_ru_channel_enabled: true
