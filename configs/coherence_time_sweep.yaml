# Coherence-time experiment sweep (cooldown-on-failure: jammer-phase vs
# channel-coherence-time decorrelation). Consumed by
# scripts/run_coherence_experiment.py, which prunes redundant cells (e.g. no
# cooldown sweep for policies that never apply a cooldown, no jammer-phase
# sweep when the jammer is off) and supports --matrix {debug,reduced,full}.
#
# All runs use the per-RU core harness (ns3_core_harness, per-RU path) because
# that path honours --jammer-phase-ms. The AR(1) correlation model is the
# primary evidence; block fading is retained as a labelled sanity baseline.
# This is a documented engineering channel model, NOT a calibrated 802.11ax PHY.
simulation:
  binary: build/industrial-wifi-sim
  simulation_path: ns3_core_harness
  channel_model: cm8_rayleigh
  output_dir: results/coherence_time_experiment
  per_ru_channel_enabled: true
  packets_per_run: 4000
  deadline_ms: 10.0
  num_users: 8
  num_rus: 8
  ru_width_tones: 26
  ru_correlation_rho: 0.2
  jammer_power_dbm: 20
  jammer_distance_m: 1.0
  jammer_burst_ms: 4
  jammer_interval_ms: 20
  ofdm_symbol_us: 16.0
  # Fixed fading seed so the small-scale channel realisation is shared across
  # policies (clean Delta-PDR isolation). Per-seed runs offset this internally.
  fading_seed: 777
  channel_update_period_us: 50

# Full factorial space. The runner trims this for debug/reduced matrices.
sweep:
  channel_correlation_model: [ar1, block]
  coherence_time_ms: [0.5, 1, 2, 5, 10, 20]
  policy: [baseline_pf, cooldown_only, ru_retarget_only, cooldown_plus_retarget]
  cooldown_symbols: [0, 19, 38, 76, 152, 304]
  jammer_ru_mode: [none, broadband_reactive, narrowband_reactive]
  jammer_phase_ms: [0, 5, 10]
  mcs: [0, 1, 3]
  payload_bits: [128, 256, 512]
  distance_m: [3, 6]
  seeds: [20260507, 20260508, 20260509]
  deadline_ms: [10]
