name: ieee80211be_eht_like
standard: 80211be
fallback_standard: 80211ax
description: Use native EHT when ns-3 supports it; otherwise HE approximation.
bandwidth_mhz: 20
guard_interval_ns: 3200
mcs: [0, 1, 3]
mcs_to_mode:
  0: EhtMcs0
  1: EhtMcs1
  3: EhtMcs3
fallback_mcs_to_mode:
  0: HeMcs0
  1: HeMcs1
  3: HeMcs3

