simulation:
  simulation_time_s: 1.0
  warmup_s: 0.5
  # Main paper campaign uses the three documented seeds.
  seeds: [20260507, 20260508, 20260509]
  output_dir: results/paper_snr
  # 100 000 packets per (channel, scenario, MCS, payload, distance, jammer, SNR,
  # seed) point keep the matrix tractable at SNR step 0.5 dB while still
  # resolving PLR/PER down to ~1e-5 once averaged across seeds. Increase only
  # if you need additional resolution; see RESULTS_FOR_PAPER.md.
  packets_per_run: 100000
  deadline_ms: 10.0

sweep:
  channel_model: [cm8_rayleigh, quadriga_raytraced]
  scenario: [S4, S8, S9]
  mcs: [0, 1, 3]
  payload_bits: [128, 256, 512]
  # CM8 distances kept short to stay inside the calibrated NLOS range of the
  # IEEE 802.11 industrial channel model. QuaDRiGa distances are taken from
  # the trace file (data/quadriga/example_trace.csv) which spans 3-12 m.
  cm8_distance_m: [3, 6]
  jammer_mode: [none, constant, reactive]
  jammer_power_dbm: [0, 10, 20]

quadriga:
  trace_path: data/quadriga/example_trace.csv
