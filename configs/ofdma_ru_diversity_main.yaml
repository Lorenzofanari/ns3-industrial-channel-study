# Full OFDMA RU-diversity campaign. This matrix is large; shard with --seed or
# edit one dimension before launching on a workstation.
simulation:
  simulation_path: ns3_core_harness
  simulation_time_s: 1.0
  warmup_s: 0.5
  seeds: [20260507, 20260508, 20260509]
  output_dir: results/ofdma_ru_diversity_main
  packets_per_run: 10000
  deadline_ms: 10.0

sweep:
  channel_model: [cm8_rayleigh]
  scenario: [S4]
  policy: [baseline_pf, rtx_assist, cooldown_only, ru_retarget_only, cooldown_plus_retarget, random_ru_hop, oracle_best_ru]
  mcs: [0, 1, 3]
  payload_bits: [128, 256, 512]
  cm8_distance_m: [3, 6]
  jammer_mode: [none]
  jammer_ru_mode: [broadband_reactive, narrowband_reactive, partial_band_reactive_random]
  jammer_power_dbm: [10, 20]
  num_users: [6, 20]
  num_rus: [4, 8]
  ru_width_tones: [26]
  ru_correlation_rho: [0.2]
  jammed_ru_count: [1, 2, 4]
  jammer_burst_ms: [2, 4, 8, 16]
  jammer_interval_ms: [10, 20, 40]
  jammer_phase_ms: [0]
  cooldown_symbols: [0, 38, 76, 152, 304]

ofdma:
  per_ru_channel_enabled: true
